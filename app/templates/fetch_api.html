{% extends "base.html" %}

{% block title %}Fetch from API - NTA Lookup{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1 class="mb-4"><i class="bi bi-cloud-download"></i> Fetch from REDCap API</h1>
        
        <div class="card">
            <div class="card-body text-center py-5">
                <i class="bi bi-cloud-arrow-down display-1 text-primary"></i>
                <h4 class="mt-3">Ready to Fetch Data</h4>
                <p class="text-muted">Click the button below to fetch records from REDCap and assign NTAs.</p>
                
                <form method="POST">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-download"></i> Fetch and Process Records
                    </button>
                </form>
            </div>
        </div>
        
        <div class="text-center mt-3">
            <a href="{{ url_for('select_source') }}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
